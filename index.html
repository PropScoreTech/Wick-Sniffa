<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sir Darb's Sniff Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --char:   #14110D;
    --wax:    #F1E7D2;
    --flame:  #FF9A42;
    --ember:  #D6482F;
    --taupe:  #3B342A;
    --taupe-2:#26211A;
    --glow: 0 0 30px rgba(255,154,66,0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }

  body.opaque { background: var(--char); }

  body {
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* Whole card is a drag handle for moving the window; interactive
     elements opt back out with -webkit-app-region: no-drag */
  .card {
    -webkit-app-region: drag;
    position: relative;
    padding: 30px 46px 26px;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(20,17,13,0.92), rgba(20,17,13,0.88));
    border: 1px solid var(--taupe);
    box-shadow: 0 20px 50px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03);
    text-align: center;
    min-width: 320px;
    cursor: grab;
  }

  .close-btn {
    -webkit-app-region: no-drag;
    position: absolute;
    top: 8px;
    right: 10px;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #7A6E5A;
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
  }
  .close-btn:hover { color: var(--ember); background: rgba(214,72,47,0.12); }

  .eyebrow {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.04em;
    color: #9A8B72;
    margin-bottom: 2px;
  }

  .title {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 23px;
    color: var(--wax);
    letter-spacing: 0.01em;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
  }

  .wick-icon { width: 18px; height: 27px; flex-shrink: 0; }
  .flame { transform-origin: 50% 100%; animation: flicker 2.6s ease-in-out infinite; }
  @keyframes flicker {
    0%, 100% { transform: scaleY(1) scaleX(1) translateX(0); opacity: 1; }
    25% { transform: scaleY(1.08) scaleX(0.95) translateX(-0.5px); opacity: 0.96; }
    50% { transform: scaleY(0.94) scaleX(1.05) translateX(0.5px); opacity: 1; }
    75% { transform: scaleY(1.05) scaleX(0.97) translateX(-0.3px); opacity: 0.98; }
  }

  .count {
    -webkit-app-region: no-drag;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 84px;
    line-height: 1;
    color: var(--wax);
    letter-spacing: -0.02em;
    transition: text-shadow 0.15s ease, transform 0.1s ease;
    cursor: pointer;
  }
  .count.pulse { text-shadow: var(--glow); transform: scale(1.04); }

  .label {
    -webkit-app-region: drag;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #7A6E5A;
    margin-top: 4px;
  }

  .controls {
    -webkit-app-region: no-drag;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 18px;
  }

  .ctrl-btn {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.06em;
    color: #C9BCA2;
    background: var(--taupe-2);
    border: 1px solid var(--taupe);
    border-radius: 8px;
    padding: 7px 12px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .ctrl-btn:hover { border-color: var(--flame); color: var(--flame); }
  .ctrl-btn.reset:hover { border-color: var(--ember); color: var(--ember); }

  .hint {
    -webkit-app-region: drag;
    margin-top: 14px;
    font-size: 9.5px;
    letter-spacing: 0.04em;
    color: rgba(154,139,114,0.5);
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <button class="close-btn" id="closeBtn" title="Close">✕</button>
    <div class="eyebrow">est. every rejected wick</div>
    <div class="title">
      <svg class="wick-icon" viewBox="0 0 20 30">
        <rect x="8" y="10" width="4" height="20" rx="1.5" fill="#F1E7D2"/>
        <path class="flame" d="M10 0 C6 5 6.5 9 10 11 C13.5 9 14 5 10 0 Z" fill="#FF9A42"/>
        <path class="flame" d="M10 3 C8 6 8.3 8.5 10 9.7 C11.7 8.5 12 6 10 3 Z" fill="#FFD48A" opacity="0.9"/>
      </svg>
      Sir Darb's Sniff Counter
    </div>

    <div class="count" id="count">0</div>
    <div class="label">wicks sniffed</div>

    <div class="controls">
      <button class="ctrl-btn" id="minusBtn" title="Misclick? Take one off">− 1</button>
      <button class="ctrl-btn reset" id="resetBtn" title="Reset to zero">Reset</button>
      <button class="ctrl-btn" id="bgBtn" title="Toggle background">BG</button>
    </div>

    <div class="hint">click number to sniff · drag card to move · space/+ / − / R also work</div>
  </div>

<script>
  const countEl = document.getElementById('count');
  const body = document.body;
  let count = 0;

  async function init() {
    count = await window.sniffAPI.loadCount();
    countEl.textContent = count;
    const bgMode = await window.sniffAPI.loadBg();
    applyBg(bgMode, false);
  }

  function render() {
    countEl.textContent = count;
    window.sniffAPI.saveCount(count);
    countEl.classList.remove('pulse');
    void countEl.offsetWidth;
    countEl.classList.add('pulse');
  }

  function increment() { count += 1; render(); }
  function decrement() { count = Math.max(0, count - 1); render(); }
  function resetCount() {
    if (confirm("Reset Sir Darb's Sniff Counter to 0?")) {
      count = 0;
      render();
    }
  }

  function applyBg(mode, persist = true) {
    body.classList.toggle('opaque', mode === 'opaque');
    if (persist) window.sniffAPI.saveBg(mode);
  }
  let bgMode = 'transparent';

  countEl.addEventListener('click', increment);
  document.getElementById('minusBtn').addEventListener('click', decrement);
  document.getElementById('resetBtn').addEventListener('click', resetCount);
  document.getElementById('bgBtn').addEventListener('click', () => {
    bgMode = bgMode === 'opaque' ? 'transparent' : 'opaque';
    applyBg(bgMode);
  });
  document.getElementById('closeBtn').addEventListener('click', () => {
    window.sniffAPI.closeApp();
  });

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.key === '+' || e.key === 'ArrowUp') { e.preventDefault(); increment(); }
    else if (e.key === '-' || e.key === 'ArrowDown') { e.preventDefault(); decrement(); }
    else if (e.key.toLowerCase() === 'r') { resetCount(); }
    else if (e.key.toLowerCase() === 'b') { bgMode = bgMode === 'opaque' ? 'transparent' : 'opaque'; applyBg(bgMode); }
  });

  init();
</script>
</body>
</html>
