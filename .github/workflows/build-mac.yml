name: Build Mac App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build the Mac app (.dmg)
        run: npm run dist -- --publish=never

      - name: Clear quarantine attributes
        run: xattr -cr dist/*.dmg || true

      - name: Upload the built app as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: sir-darbs-sniff-counter-mac
          path: dist/*.dmg
